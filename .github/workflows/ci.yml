name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run Ruff
        run: python -m ruff check app src tests examples scripts

      - name: Run reference workflows
        run: python -m pytest -q tests/test_reference_workflows.py

      - name: Run tests
        run: python -m pytest -q

      - name: Run monitoring profile smoke test
        run: python scripts/profile_monitoring_run.py --rows 100 --artifact-profile minimal
